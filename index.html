<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Authentic Chengdu Local Adventures | Off-the-Beaten-Path Small Group Tours</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <div id="navbar-container"></div>
  <div id="hero-container"></div>
  <div id="experiences-container"></div>
  <div id="scenes-container"></div>
  <div id="form-container"></div>
  <div id="footer-container"></div>

  <script>
    async function loadComponent(containerId, componentPath) {
      const res = await fetch(componentPath);
      const html = await res.text();
      document.getElementById(containerId).innerHTML = html;
    }

    Promise.all([
      loadComponent('navbar-container', 'components/Navbar.html'),
      loadComponent('hero-container', 'components/Hero.html'),
      loadComponent('experiences-container', 'components/Experiences.html'),
      loadComponent('scenes-container', 'components/Scenes.html'),
      loadComponent('form-container', 'components/FormSection.html'),
      loadComponent('footer-container', 'components/Footer.html')
    ]).then(() => {
      const script = document.createElement('script');
      script.textContent = `
        const slideIndices = { alleys: 0, tea: 0, markets: 0, parks: 0, hiking: 0, craft: 0, food: 0 };
        function openSceneModal(scene) {
          const modal = document.getElementById(\`\${scene}Modal\`);
          modal.style.display = "flex";
          showSlides(scene, slideIndices[scene]);
        }
        function closeSceneModal() {
          document.querySelectorAll('.scene-modal').forEach(m => m.style.display = "none");
        }
        function prevSlide(s) {
          slideIndices[s]--;
          showSlides(s, slideIndices[s]);
        }
        function nextSlide(s) {
          slideIndices[s]++;
          showSlides(s, slideIndices[s]);
        }
        function showSlides(scene, n) {
          const modal = document.getElementById(\`\${scene}Modal\`);
          const slides = modal.querySelectorAll('.carousel-img');
          if (n >= slides.length) slideIndices[scene] = 0;
          if (n < 0) slideIndices[scene] = slides.length - 1;
          slides.forEach(slide => slide.classList.remove('active'));
          slides[slideIndices[scene]].classList.add('active');
        }
        window.onclick = function(e) {
          if (e.target.classList.contains('scene-modal')) closeSceneModal();
        }
      `;
      document.body.appendChild(script);
    });
  </script>
</body>
</html>
